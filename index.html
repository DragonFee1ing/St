    <style>
        /* MLG CURSOR */
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: url('https://i.imgur.com/rHJ0CHE.png'), linear-gradient(45deg, #ff0000, #00ff00, #0000ff, #ff00ff, #ffff00, #00ffff);
            background-size: 200px, 400% 400%;
            background-blend-mode: overlay;
            animation: mlgBackground 2s infinite linear;
            font-family: 'Comic Sans MS', 'Impact', cursive;
            text-align: center;
            overflow: hidden;
            cursor: crosshair; /* Снайперский прицел */
        }

        /* ЭПИЛЕПТИЧЕСКИЙ ФОН */
        @keyframes mlgBackground {
            0% { background-position: 0 0, 0% 50%; filter: hue-rotate(0deg); }
            50% { background-position: 100px 100px, 100% 50%; filter: hue-rotate(180deg); }
            100% { background-position: 200px 200px, 0% 50%; filter: hue-rotate(360deg); }
        }

        /* ТРЯСКА ЭКРАНА (АКТИВИРУЕТСЯ ПРИ КЛИКЕ) */
        .mlg-shake {
            animation: shake 0.1s infinite;
        }

        @keyframes shake {
            0% { transform: translate(3px, 2px) rotate(0deg); }
            10% { transform: translate(-3px, -2px) rotate(-2deg); }
            20% { transform: translate(-4px, 0px) rotate(2deg); }
            30% { transform: translate(0px, 3px) rotate(0deg); }
            40% { transform: translate(3px, -2px) rotate(2deg); }
            50% { transform: translate(-3px, 3px) rotate(-2deg); }
            60% { transform: translate(4px, 2px) rotate(0deg); }
            70% { transform: translate(-2px, -3px) rotate(-2deg); }
            80% { transform: translate(2px, 3px) rotate(2deg); }
            90% { transform: translate(-4px, -2px) rotate(0deg); }
            100% { transform: translate(3px, -3px) rotate(-2deg); }
        }

        h1 {
            color: #00ff00;
            text-transform: uppercase;
            text-shadow: 4px 4px 0 #ff0000, -4px -4px 0 #0000ff;
            font-size: 3em;
            margin: 20px;
            animation: bounce 0.1s infinite alternate, rgbText 2s infinite;
            position: relative;
            z-index: 10;
        }

        @keyframes rgbText {
            0% { color: #00ff00; }
            33% { color: #ff00ff; }
            66% { color: #00ffff; }
            100% { color: #00ff00; }
        }

        .glitch {
            position: relative;
            display: inline-block;
        }

        .glitch::before,
        .glitch::after {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: transparent;
            color: #fff;
            overflow: hidden;
            pointer-events: none;
        }

        .glitch::before {
            left: 4px;
            text-shadow: -3px 0 #ff00ff;
            animation: glitch-anim 0.2s infinite linear;
        }

        .glitch::after {
            left: -4px;
            text-shadow: 3px 0 #00ffff;
            animation: glitch-anim 0.2s infinite linear reverse;
        }

        @keyframes glitch-anim {
            0% { clip-path: inset(0 0 95% 0); transform: skew(0deg); }
            25% { clip-path: inset(0 0 60% 0); transform: skew(10deg); }
            50% { clip-path: inset(0 0 30% 0); transform: skew(-10deg); }
            75% { clip-path: inset(0 0 5% 0); transform: skew(5deg); }
            100% { clip-path: inset(0 0 70% 0); transform: skew(-5deg); }
        }

        .button-container {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 10;
        }

        #megaButton {
            padding: 30px 60px;
            font-size: 2.5em;
            font-weight: bold;
            background: #ffd700;
            color: red;
            border: 10px solid #00ff00;
            border-radius: 0; /* Острые углы для агрессивности */
            cursor: crosshair;
            transition: all 0.1s ease;
            box-shadow: 15px 15px 0px #ff00ff, -15px -15px 0px #00ffff;
            font-family: 'Impact', 'Comic Sans MS', cursive;
            transform: rotate(-5deg) scale(1.2);
            position: relative;
            text-transform: uppercase;
            animation: pulseButton 0.5s infinite alternate, rgbBorder 1s infinite;
        }

        @keyframes pulseButton {
            from { transform: rotate(-5deg) scale(1.1); }
            to { transform: rotate(5deg) scale(1.3); }
        }

        @keyframes rgbBorder {
            0% { border-color: #00ff00; background: #ff0000; color: #ffff00; }
            50% { border-color: #ff00ff; background: #0000ff; color: #00ff00; }
            100% { border-color: #00ff00; background: #ff0000; color: #ffff00; }
        }

        #megaButton:active {
            transform: scale(0.7) rotate(20deg);
            box-shadow: 0 0 50px #fff;
        }

        /* MLG ХИТМАРКЕР */
        .hitmarker {
            position: absolute;
            width: 60px;
            height: 60px;
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
            animation: hitmarkerAnim 0.2s ease-out forwards;
        }

        @keyframes hitmarkerAnim {
            0% { transform: translate(-50%, -50%) scale(0.5); opacity: 1; }
            50% { transform: translate(-50%, -50%) scale(1.5); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(2); opacity: 0; }
        }

        /* MLG ЭЛЕМЕНТЫ: Снуп Дог, Иллюминаты, Очки */
        .mlg-item {
            position: absolute;
            z-index: 5;
            pointer-events: none;
        }

        .snoop {
            bottom: -20px;
            left: 10px;
            width: 250px;
            animation: bounce 0.4s infinite alternate;
        }

        .illuminati {
            top: 20px;
            right: 20px;
            width: 150px;
            animation: spin 3s linear infinite;
        }

        .deal-with-it {
            top: -100px;
            left: 50%;
            transform: translateX(-50%);
            width: 300px;
            animation: dropGlasses 4s infinite;
            z-index: 15;
        }

        @keyframes dropGlasses {
            0% { top: -100px; }
            50% { top: 30%; }
            100% { top: -100px; }
        }

        /* БЕГУЩАЯ СТРОКА (КЛАССИКА!) */
        .marquee-container {
            width: 100%;
            background: #000;
            color: #00ff00;
            font-size: 2em;
            font-family: 'Impact', sans-serif;
            border-top: 5px solid #ff00ff;
            border-bottom: 5px solid #00ffff;
            position: absolute;
            z-index: 20;
            box-shadow: 0 0 20px #00ff00;
        }

        .marquee-top { top: 0; }
        .marquee-bottom { bottom: 0; }

        @keyframes bounce {
            from { transform: translateY(0); }
            to { transform: translateY(-20px); }
        }

        @keyframes spin {
            from { transform: rotate(0deg) scale(1); }
            50% { transform: rotate(180deg) scale(1.5); }
            to { transform: rotate(360deg) scale(1); }
        }

        @keyframes float {
            0% { transform: translateY(-10%) rotate(0deg) scale(1); }
            50% { transform: translateY(10%) rotate(180deg) scale(1.5); }
            100% { transform: translateY(-10%) rotate(360deg) scale(1); }
        }

        .doritos, .dew {
            animation: float 2s infinite linear;
            width: 120px;
        }

        /* Мобильная версия */
        @media (max-width: 600px) {
            h1 { font-size: 1.8em; }
            #megaButton { padding: 20px 30px; font-size: 1.5em; }
            .snoop { width: 120px; }
            .illuminati { width: 80px; }
            .marquee-container { font-size: 1.2em; }
            .doritos, .dew { width: 60px; }
        }
    </style>
</head>

    <div class="button-container">

    <script>
        function playSound(e) {
            const sound = document.getElementById('sound');
            sound.currentTime = 0;
            sound.play();
            
            // ЭФФЕКТ ТРЯСКИ ЭКРАНА (SCREEN SHAKE)
            document.body.classList.add('mlg-shake');
            setTimeout(() => {
                document.body.classList.remove('mlg-shake');
            }, 300);

            // СПАВН ХИТМАРКЕРА
            if (e) {
                const hit = document.createElement('img');
                // URL классического хитмаркера
                hit.src = 'https://i.imgur.com/O61Ovu1.png'; 
                hit.className = 'hitmarker';
                
                // Проверяем, был ли это тач (мобилка) или клик (ПК)
                const x = e.pageX || (e.touches && e.touches[0].pageX);
                const y = e.pageY || (e.touches && e.touches[0].pageY);
                
                hit.style.left = x + 'px';
                hit.style.top = y + 'px';
                document.body.appendChild(hit);
                
                // Удаляем хитмаркер после анимации
                setTimeout(() => hit.remove(), 200);
            }

            // Добавляем временный хаотичный стиль при нажатии
            const button = document.getElementById('megaButton');
            button.style.transform = 'scale(0.5) rotate(45deg)';
            button.style.filter = 'invert(1)';
            setTimeout(() => {
                button.style.transform = '';
                button.style.filter = '';
            }, 200);
        }

        // Эффект при касании на мобильных + вызов хитмаркера
        document.addEventListener('touchstart', function(e) {
            if(e.target === document.getElementById('megaButton')) {
                playSound(e); // Вызываем звук и хитмаркер сразу по тачу для лучшего отклика
            }
        });

        // Глитч для мобильных устройств
        const glitchText = document.querySelector('.glitch');
        glitchText.addEventListener('touchstart', () => {
            glitchText.classList.add('hover');
        });
        glitchText.addEventListener('touchend', () => {
            glitchText.classList.remove('hover');
        });
    </script>
